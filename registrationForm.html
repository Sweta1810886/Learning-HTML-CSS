<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Form</title>
    <style>
        /* Reset some default styles */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

/* Body styling */
body {
    font-family: Arial, Helvetica, sans-serif;
    background: linear-gradient(135deg, #74ebd5, #9face6);
    padding: 20px;
}

/* Main container look */
h1 {
    text-align: center;
    margin-bottom: 10px;
    color: #333;
}

p {
    text-align: center;
    margin-bottom: 20px;
}

/* Section headings */
h2 {
    margin-top: 20px;
    color: #444;
}

/* Form styling */
form {
    background: #ffffff;
    padding: 20px;
    margin: 15px auto;
    border-radius: 10px;
    max-width: 600px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

/* Labels */
label {
    font-weight: bold;
    color: #333;
}

/* Inputs, textarea, select */
input[type="text"],
input[type="email"],
input[type="number"],
input[type="date"],
input[type="password"],
select,
textarea {
    width: 100%;
    padding: 10px;
    margin-top: 5px;
    margin-bottom: 15px;
    border: 1px solid #ccc;
    border-radius: 6px;
    transition: 0.3s;
}

/* Focus effect */
input:focus,
textarea:focus,
select:focus {
    border-color: #6c63ff;
    outline: none;
    box-shadow: 0 0 5px rgba(108, 99, 255, 0.5);
}

/* Radio & checkbox alignment */
input[type="radio"],
input[type="checkbox"] {
    margin-right: 8px;
}

/* File input */
input[type="file"] {
    margin-top: 10px;
}

/* Buttons */
button {
    padding: 10px 20px;
    margin: 10px 5px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-size: 16px;
}

/* Submit button */
button[type="submit"] {
    background-color: #6c63ff;
    color: white;
}

button[type="submit"]:hover {
    background-color: #574fd6;
}

/* Reset button */
button[type="reset"] {
    background-color: #ff6b6b;
    color: white;
}

button[type="reset"]:hover {
    background-color: #e55050;
}

/* Horizontal rule */
hr {
    margin: 20px 0;
}
    </style>
</head>
<body>
    <h1>University Registration Form</h1>
    <p>Please fill out the form.</p><hr>
    <h2>Personal Details</h2>
    <form action="">
        <label for="name">First Name:</label>
        <input type="text" name="name" placeholder="eg. Sweta"><br><br>

        <label for="surname">Last Name:</label>
        <input type="text" name="surname" placeholder="eg. Bharti"><br><br>

        <label for="">Date of Birth:</label>
        <input type="date" name="" id=""><br><br>

        <h5>Gender:</h5>
        <label for="Male">Male</label>
        <input type="radio" name="gender" id="Male" value="Male"><br>
        <label for="Female">Female</label>
        <input type="radio" name="gender" id="Female" value="Female"><br>
        <label for="other">other</label>
        <input type="radio" name="gender" id="other" value="other" > <br><br>

        <h5>Upload your photo:</h5>
        <input type="file" name="file" id="">
        <hr>
    </form>
    <h2>Contact Information</h2>
    <form action="">
        <label for="email">Email Address:</label>
        <input type="email" name="email" id="email" placeholder="abc@gmail.com"><br><br>

        <label for="phoneNumber">Phone:</label>
        <input type="number" name="phoneNumber" id="phoneNumber"><br><br>

        <label for="Address">Address:</label><br>
        <textarea name="Address" id="Address"></textarea>
        <hr>
    </form>
    <h2>Academic Information</h2>
    <form action="">
        <label for="">Select your course:</label>
        <select name="course" id="course">
            <option value="CSE">CSE</option>
            <option value="CE">CE</option>
            <option value="ME">ME</option>
        </select> <BR></BR>

        <h5>Extra curricular activities:</h5>

        <label for="Sports">Sports</label>
        <input type="checkbox" name="interest" id="Sports"><br>

        <label for="Music & art">Music & art</label>
        <input type="checkbox" name="interest" id="Music & art"><br>

        <label for="Technology Club">Technology Club</label>
        <input type="checkbox" name="interest" id="Technology Club"><br>

        <label for="Volunteering">Volunteering</label>
        <input type="checkbox" name="interest" id="Volunteering"><br>
    </form>
    <h2>Create your Account</h2>
    <form action="">
        <label for="pass">Create your password:</label>
        <input type="password" name="password" id="pass"><br>

        <label for="Security Question:">Security Question</label>
        <select name="Security Question" id="Security Question">
            <option value="pet's name">What's your pet's name?</option>
            <option value="middle name">What's your middle name?</option>
            <option value="school name ">What was your first school name?</option>
        </select><br>

        <label for="answer">Security Answer:</label>
        <input type="text">
    </form>
    <hr>
    <button type="submit">Register</button>
    <button type="reset">clear form</button>
</body>
</html>
