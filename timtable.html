<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Time table</title>
    <style>
        table {
            border-collapse: collapse;
            width: 80%;
            margin: 20px auto;
            text-align: center;
        }

        th, td {
            border: 1px solid #000;
            padding: 10px;
        }

        th {
            background-color: #f2f2f2;
        }

        thead th {
            font-size: 24px;
            background-color: #d9edf7;
        }

        tbody tr:nth-child(4) td {
            font-weight: bold;
            background-color: #ffeeba;
        }
    </style>
</head>
<body>
    <table>
        <thead>
            <tr>
                <th colspan="7">timetable</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td rowspan="6">Hours</td>
                <td>MON</td>
                <td>TUE</td>
                <td>WED</td>
                <td>THU</td>
                <td>FRI</td>
                <td>SAT</td>
            </tr>
            <tr>
                <td>maths</td>
                <td>maths</td>
                <td>maths</td>
                <td>maths</td>
                <td>maths</td>
                <td>maths</td>
                
            </tr>
            <tr>
                <td>science</td>
                <td>science</td>
                <td>science</td>
                <td>science</td>
                <td>science</td>
                <td>science</td>
            </tr>
            <tr>
                <td colspan="6">LUNCH</td>
            </tr>
            <tr>
                <td>english</td>
                <td>english</td>
                <td>english</td>
                <td>english</td>
                <td>english</td>
                <td>game</td>
            </tr>
            <tr>
                <td>hindi</td>
                <td>hindi</td>
                <td>hindi</td>
                <td>hindi</td>
                <td>hindi</td>
                <td>game</td>
            </tr>
        </tbody>
    </table>
</body>
</html>
